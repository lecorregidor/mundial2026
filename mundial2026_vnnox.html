<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1500">
<title>Mundial 2026</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1500px; height:500px; overflow:hidden; background:#000; font-family:'Arial Black',Arial,sans-serif; }

/* FONDO BANDERA */
.bg-flag { position:fixed; inset:0; display:flex; flex-direction:column; z-index:0; }
.f-a { flex:1; background:#74ACDF; }
.f-b { flex:1; background:#fff; }
.sol-wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:1; }
.sol { width:210px; height:210px; opacity:0.15; }

/* VISTAS */
.vista { display:none; position:absolute; inset:0; z-index:10; }
.vista.on { display:flex; align-items:center; justify-content:center; }

/* CARD BASE */
.card {
  position:relative; overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:#080808;
  border:3px solid #C9A227;
  border-top-width:7px; border-bottom-width:7px;
}

/* Textura 26 */
.t26 { position:absolute; inset:0; display:grid; opacity:0.032; font-size:66px; font-weight:900; color:#fff; pointer-events:none; user-select:none; overflow:hidden; }
.n { display:flex; align-items:center; justify-content:center; letter-spacing:-1px; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ════════════════════════
   VISTA PARTIDO NORMAL
════════════════════════ */
#vP .card { width:1180px; height:390px; }
#vP .t26 { grid-template-columns:repeat(13,1fr); grid-template-rows:repeat(4,1fr); }

.ph { display:flex; align-items:center; gap:16px; margin-bottom:18px; position:relative; z-index:2; }
.badge { background:#C9A227; color:#000; font-size:11px; font-weight:900; letter-spacing:3px; padding:5px 18px; text-transform:uppercase; }
.fase { color:#C9A227; font-size:13px; font-weight:700; letter-spacing:3px; text-transform:uppercase; font-family:Arial,sans-serif; }
.vivo { display:none; align-items:center; gap:10px; background:rgba(255,0,0,0.15); border:2px solid #f33; padding:5px 16px; }
.vivo .dot { width:11px; height:11px; border-radius:50%; background:#f33; animation:blink 1s infinite; flex-shrink:0; }
.vivo span { color:#f33; font-size:18px; font-weight:900; letter-spacing:3px; }

.pr { display:flex; align-items:center; justify-content:center; width:100%; position:relative; z-index:2; }
.eq { display:flex; flex-direction:column; align-items:center; gap:12px; width:370px; }
.eq img { width:160px; height:106px; object-fit:contain; }
.eq-n { color:#fff; font-size:30px; font-weight:900; letter-spacing:3px; text-transform:uppercase; text-align:center; line-height:1.2; }
.ln { width:2px; height:190px; background:linear-gradient(180deg,transparent,#C9A227 25%,#C9A227 75%,transparent); margin:0 8px; }
.sb { width:280px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
.sr { display:flex; align-items:center; }
.sn { color:#fff; font-size:120px; font-weight:900; line-height:1; width:100px; text-align:center; }
.sd { color:#C9A227; font-size:100px; font-weight:900; line-height:1; padding-bottom:8px; }
.sc { color:#C9A227; font-size:20px; font-weight:900; letter-spacing:2px; font-family:Arial,sans-serif; }
.vs { color:#C9A227; font-size:72px; font-weight:900; letter-spacing:6px; line-height:1; }
.kh { color:#fff; font-size:24px; font-weight:700; letter-spacing:2px; font-family:Arial,sans-serif; margin-top:6px; }
.kf { color:#666; font-size:12px; letter-spacing:2px; text-transform:uppercase; font-family:Arial,sans-serif; margin-top:4px; }

/* ════════════════════════
   VISTA ARGENTINA
════════════════════════ */
#vA .card {
  width:1240px; height:420px;
  background:linear-gradient(135deg,#4a9fd4,#74ACDF 40%,#5aaee0 60%,#3d8fc4);
  border-color:#F6B40E; border-top-width:8px; border-bottom-width:8px; border-left-width:4px; border-right-width:4px;
}
#vA .t26 { grid-template-columns:repeat(13,1fr); grid-template-rows:repeat(4,1fr); color:#fff; }
.arg-stars { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; opacity:0.07; font-size:180px; letter-spacing:60px; }
.abadge { background:#F6B40E; color:#000; font-size:12px; font-weight:900; letter-spacing:3px; padding:5px 20px; text-transform:uppercase; }
.afase { color:#fff; font-size:14px; font-weight:700; letter-spacing:3px; text-transform:uppercase; font-family:Arial,sans-serif; text-shadow:0 1px 3px rgba(0,0,0,.4); }
.avivo { display:none; align-items:center; gap:8px; background:rgba(255,0,0,.2); border:1px solid #f44; padding:4px 12px; }
.avivo .dot { width:9px; height:9px; border-radius:50%; background:#f44; animation:blink 1s infinite; }
.avivo span { color:#f44; font-size:14px; font-weight:900; letter-spacing:2px; font-family:Arial,sans-serif; }
.aeq img { filter:drop-shadow(0 4px 12px rgba(0,0,0,.4)); }
.an { color:#fff; font-family:Impact,'Arial Black',Arial,sans-serif; font-size:42px; letter-spacing:5px; text-transform:uppercase; text-align:center; text-shadow:2px 2px 8px rgba(0,0,0,.5); line-height:1.1; }
.an.arg { color:#F6B40E; font-size:48px; }
.aln { width:2px; height:210px; background:linear-gradient(180deg,transparent,rgba(255,255,255,.6) 25%,rgba(255,255,255,.6) 75%,transparent); margin:0 10px; }
.avs { color:#fff; font-family:Impact,'Arial Black',Arial,sans-serif; font-size:80px; letter-spacing:8px; line-height:1; text-shadow:3px 3px 0 rgba(0,0,0,.4); }
.acd { display:flex; gap:8px; align-items:center; }
.cb { display:flex; flex-direction:column; align-items:center; background:rgba(0,0,0,.25); padding:6px 12px; border-radius:4px; }
.cn { color:#fff; font-family:Impact,'Arial Black',Arial,sans-serif; font-size:44px; line-height:1; text-shadow:2px 2px 0 rgba(0,0,0,.5); }
.cl { color:rgba(255,255,255,.7); font-size:10px; letter-spacing:2px; text-transform:uppercase; font-family:Arial,sans-serif; margin-top:2px; }
.cs { color:#F6B40E; font-size:36px; font-weight:900; margin-bottom:20px; font-family:Impact,Arial,sans-serif; }
.akf { color:rgba(255,255,255,.75); font-size:13px; letter-spacing:2px; text-transform:uppercase; font-family:Arial,sans-serif; margin-top:4px; }
.asn { color:#fff; font-family:Impact,'Arial Black',Arial,sans-serif; font-size:130px; font-weight:900; line-height:1; width:110px; text-align:center; text-shadow:3px 3px 0 rgba(0,0,0,.4); }
.asd { color:#F6B40E; font-family:Impact,Arial,sans-serif; font-size:110px; font-weight:900; line-height:1; padding-bottom:10px; }
.ack { color:#fff; font-size:22px; font-weight:900; letter-spacing:2px; font-family:Arial,sans-serif; text-shadow:1px 1px 4px rgba(0,0,0,.5); }

/* ════════════════════════
   SLIDES GRILLA
════════════════════════ */
#vProx .card, #vRes .card { width:1380px; height:430px; padding:0 28px; }
#vProx .t26, #vRes .t26 { grid-template-columns:repeat(15,1fr); grid-template-rows:repeat(4,1fr); }
.sh { display:flex; align-items:center; gap:16px; margin-bottom:16px; position:relative; z-index:2; width:100%; }
.stit { color:#C9A227; font-size:13px; font-weight:700; letter-spacing:4px; text-transform:uppercase; font-family:Arial,sans-serif; }
.stit.w { color:#fff; }
.sfec { color:#555; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; font-family:Arial,sans-serif; margin-left:auto; }

/* Proximos */
.pg { display:flex; flex-direction:column; gap:10px; width:100%; position:relative; z-index:2; }
.pi { display:flex; align-items:center; background:#111; border-left:4px solid #C9A227; padding:14px 24px; gap:20px; height:86px; }
.pi-h { color:#C9A227; font-size:28px; font-weight:900; font-family:Arial,sans-serif; min-width:80px; }
.pi-sep { width:2px; height:56px; background:#2a2a2a; }
.pi-eq { flex:1; display:flex; align-items:center; gap:16px; }
.pi-eq img { width:48px; height:32px; object-fit:contain; }
.pi-vs { color:#555; font-size:18px; font-weight:900; letter-spacing:2px; padding:0 8px; }
.pi-n { color:#fff; font-size:26px; font-weight:900; letter-spacing:2px; text-transform:uppercase; }
.pi-g { color:#444; font-size:11px; letter-spacing:2px; text-transform:uppercase; font-family:Arial,sans-serif; margin-left:auto; }

/* Resultados */
.rg { display:flex; flex-direction:column; gap:10px; width:100%; position:relative; z-index:2; }
.ri { display:flex; align-items:center; background:#0e0e0e; border-left:4px solid #444; padding:12px 24px; gap:16px; height:86px; }
.ri-eq { display:flex; align-items:center; gap:12px; flex:1; }
.ri-eq img { width:44px; height:30px; object-fit:contain; }
.ri-n { color:#ccc; font-size:24px; font-weight:900; letter-spacing:2px; text-transform:uppercase; }
.ri-sc { display:flex; align-items:center; min-width:120px; justify-content:center; }
.ri-g { color:#fff; font-size:40px; font-weight:900; width:44px; text-align:center; }
.ri-s { color:#444; font-size:36px; font-weight:900; padding-bottom:4px; }

/* FOOTER */
.ft { position:fixed; bottom:12px; left:0; right:0; display:flex; justify-content:center; gap:20px; z-index:20; }
.ft span { color:rgba(0,0,0,.4); font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; font-family:Arial,sans-serif; }
</style>
</head>
<body>

<div class="bg-flag"><div class="f-a"></div><div class="f-b"></div><div class="f-a"></div></div>

<div class="sol-wrap">

  <div class="card">

    <div class="ph" style="position:relative;z-index:2;margin-bottom:18px;">

<!-- VISTA PROXIMOS -->
<div class="vista" id="vProx">
  <div class="card">
    <div class="t26" id="t26Prox"></div>

</div>

<!-- VISTA RESULTADOS -->

</div>

<div class="ft">
  <span>Municipalidad de El Calafate</span>
  <span>·</span>

</div>

<script>
const ESPN = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
const MINS_ANTES = 15;
const MINS_DESP  = 60;
const SLIDE_MS   = 8000;

/* ── Textura 26 ── */
function t26(id, c, r) {
  const el = document.getElementById(id);
  el.style.gridTemplateColumns = `repeat(${c},1fr)`;
  el.style.gridTemplateRows    = `repeat(${r},1fr)`;
  for (let i=0;i<c*r;i++){const d=document.createElement('div');d.className='n';d.textContent='26';el.appendChild(d);}
}
t26('t26P',13,4); t26('t26A',13,4); t26('t26Prox',15,4); t26('t26Res',15,4);

/* ── Reloj ── */
setInterval(()=>{document.getElementById('reloj').textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});},1000);
document.getElementById('reloj').textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});

/* ── Fechas ── */
const DIAS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function horaAR(d){const ar=new Date(new Date(d).getTime()-3*3600000);return `${ar.getUTCHours().toString().padStart(2,'0')}:${ar.getUTCMinutes().toString().padStart(2,'0')}`;}
function fechaAR(d){const ar=new Date(new Date(d).getTime()-3*3600000);return `${DIAS[ar.getUTCDay()]}, ${ar.getUTCDate()} de ${MESES[ar.getUTCMonth()]}`;}

/* ── Fases ── */
const FASES={'group-stage':'Fase de Grupos','group stage':'Fase de Grupos','round-of-32':'16avos de Final','round of 32':'16avos de Final','round-of-16':'8vos de Final','round of 16':'8vos de Final','quarterfinal':'4tos de Final','semifinal':'Semifinal','3rd':'3er Puesto','final':'Final'};
function fase(slug){if(!slug)return'Copa del Mundo 2026';const s=slug.toLowerCase();for(const[k,v]of Object.entries(FASES))if(s.includes(k))return v;return slug;}

/* ── Equipos ── */
const EQ={
  'ARG':'Argentina','AUS':'Australia','AUT':'Austria','BEL':'Bélgica','BIH':'Bosnia-Herzegovina',
  'BRA':'Brasil','CMR':'Camerún','CAN':'Canadá','CHL':'Chile','CHN':'China','COL':'Colombia',
  'COD':'Congo DR','CRI':'Costa Rica','CIV':'Costa de Marfil','HRV':'Croacia','CZE':'Chequia',
  'CUW':'Curazao','DNK':'Dinamarca','ECU':'Ecuador','EGY':'Egipto','ENG':'Inglaterra',
  'FRA':'Francia','DEU':'Alemania','GER':'Alemania','GHA':'Ghana','HTI':'Haití','HUN':'Hungría',
  'IRN':'Irán','IDN':'Indonesia','JAM':'Jamaica','JPN':'Japón','KOR':'Corea del Sur',
  'MEX':'México','MAR':'Marruecos','NLD':'Países Bajos','NZL':'Nueva Zelanda','NGA':'Nigeria',
  'PRY':'Paraguay','PER':'Perú','POL':'Polonia','PRT':'Portugal','QAT':'Catar','ROU':'Rumania',
  'SAU':'Arabia Saudita','SCO':'Escocia','SEN':'Senegal','SRB':'Serbia','SVK':'Eslovaquia',
  'ZAF':'Sudáfrica','ESP':'España','SWE':'Suecia','CHE':'Suiza','SUI':'Suiza','TUN':'Túnez',
  'TUR':'Türkiye','UKR':'Ucrania','URY':'Uruguay','USA':'Estados Unidos','VEN':'Venezuela','WAL':'Gales',
  'England':'Inglaterra','Germany':'Alemania','France':'Francia','Brazil':'Brasil',
  'Netherlands':'Países Bajos','Belgium':'Bélgica','Switzerland':'Suiza','Croatia':'Croacia',
  'Denmark':'Dinamarca','Sweden':'Suecia','Poland':'Polonia','Scotland':'Escocia','Wales':'Gales',
  'Austria':'Austria','Morocco':'Marruecos','Senegal':'Senegal','Nigeria':'Nigeria','Ghana':'Ghana',
  'Cameroon':'Camerún','Tunisia':'Túnez','South Africa':'Sudáfrica','Egypt':'Egipto',
  'Congo DR':'Congo DR','Mexico':'México','United States':'Estados Unidos','Canada':'Canadá',
  'Argentina':'Argentina','Uruguay':'Uruguay','Colombia':'Colombia','Ecuador':'Ecuador',
  'Chile':'Chile','Paraguay':'Paraguay','Peru':'Perú','Japan':'Japón','South Korea':'Corea del Sur',
  'Australia':'Australia','Iran':'Irán','Saudi Arabia':'Arabia Saudita','Qatar':'Catar',
  'Indonesia':'Indonesia','Haiti':'Haití','Jamaica':'Jamaica','Costa Rica':'Costa Rica',
  'Bosnia-Herzegovina':'Bosnia-Herzegovina','Czechia':'Chequia','Turkey':'Türkiye',
  'Ivory Coast':'Costa de Marfil','Curaçao':'Curazao',
};
function trad(abbr,name){return EQ[abbr]||EQ[name]||name;}
function esArg(abbr,name){return abbr==='ARG'||(name||'').toLowerCase().includes('argentina');}

/* ── Vistas ── */
let slideTimer=null;
function mostrar(id){
  ['vP','vA','vProx','vRes'].forEach(x=>document.getElementById(x).classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

/* ── Countdown ── */
let cdInt=null;
function startCD(dateStr){
  if(cdInt)clearInterval(cdInt);
  function r(){
    const diff=Math.max(0,new Date(dateStr)-Date.now());
    const h=Math.floor(diff/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);
    const el=document.getElementById('aCD');
    if(el)el.innerHTML=`
      <div class="acd">
        <div class="cb"><div class="cn">${String(h).padStart(2,'0')}</div><div class="cl">horas</div></div>
        <div class="cs">:</div>
        <div class="cb"><div class="cn">${String(m).padStart(2,'0')}</div><div class="cl">min</div></div>
        <div class="cs">:</div>
        <div class="cb"><div class="cn">${String(s).padStart(2,'0')}</div><div class="cl">seg</div></div>
      </div>
      <div class="akf">${horaAR(dateStr)} hs · ${fechaAR(dateStr)}</div>`;
  }
  r(); cdInt=setInterval(r,1000);
}

/* ── Render partido normal ── */
function renderP(m){
  document.getElementById('pFase').textContent=m.fase;
  document.getElementById('pLH').src=m.lH;
  document.getElementById('pLA').src=m.lA;
  document.getElementById('pNH').textContent=m.nH;
  document.getElementById('pNA').textContent=m.nA;
  document.getElementById('pVivo').style.display=m.live?'flex':'none';
  const sb=document.getElementById('pSb');
  if(m.pre){
    sb.innerHTML=`<div class="vs">VS</div><div class="kh">${horaAR(m.date)} hs</div><div class="kf">${fechaAR(m.date)}</div>`;
  } else {
    sb.innerHTML=`<div class="sr"><div class="sn">${m.sH}</div><div class="sd">-</div><div class="sn">${m.sA}</div></div><div class="sc">${m.live?m.clock:'Final'}</div>`;
  }
  mostrar('vP');
}

/* ── Render Argentina ── */
function renderA(m){
  document.getElementById('aFase').textContent=m.fase;
  /* Arg siempre a la izquierda */
  const hEsArg=esArg(m.abH,m.nH);
  document.getElementById('aLH').src  = hEsArg?m.lH:m.lA;
  document.getElementById('aLA').src  = hEsArg?m.lA:m.lH;
  document.getElementById('aNH').textContent = 'ARGENTINA';
  document.getElementById('aNA').textContent = (hEsArg?m.nA:m.nH).toUpperCase();
  document.getElementById('aVivo').style.display=m.live?'flex':'none';
  const argS=hEsArg?m.sH:m.sA, rivS=hEsArg?m.sA:m.sH;
  const sb=document.getElementById('aSb');
  if(m.pre){
    sb.innerHTML=`<div class="avs">VS</div><div id="aCD"></div>`;
    startCD(m.date);
  } else {
    if(cdInt){clearInterval(cdInt);cdInt=null;}
    sb.innerHTML=`<div class="sr"><div class="asn">${argS}</div><div class="asd">-</div><div class="asn">${rivS}</div></div><div class="ack">${m.live?m.clock:'Final'}</div>`;
  }
  mostrar('vA');
}

/* ── Render próximos ── */
function renderProx(list){
  if(slideTimer){clearInterval(slideTimer);slideTimer=null;}
  document.getElementById('fProx').textContent=fechaAR(new Date().toISOString()).toUpperCase();
  const g=document.getElementById('gProx');
  g.innerHTML=list.slice(0,2).map(m=>`
    <div class="pi">
      <div class="pi-h">${horaAR(m.date)}</div>
      <div class="pi-sep"></div>
      <div class="pi-eq">
        <img src="${m.lH}" alt=""><div class="pi-n">${m.nH}</div>
        <div class="pi-vs">VS</div>
        <div class="pi-n">${m.nA}</div><img src="${m.lA}" alt="">
      </div>
      <div class="pi-g">${m.fase}</div>
    </div>`).join('');
  mostrar('vProx');
}

/* ── Render resultados ── */
function renderRes(list){
  document.getElementById('fRes').textContent=fechaAR(new Date().toISOString()).toUpperCase();
  const g=document.getElementById('gRes');
  g.innerHTML=list.slice(0,2).map(m=>`
    <div class="ri">
      <div class="ri-eq"><img src="${m.lH}" alt=""><div class="ri-n">${m.nH}</div></div>
      <div class="ri-sc"><div class="ri-g">${m.sH}</div><div class="ri-s">-</div><div class="ri-g">${m.sA}</div></div>
      <div class="ri-eq" style="justify-content:flex-end;"><div class="ri-n" style="text-align:right">${m.nA}</div><img src="${m.lA}" alt=""></div>
    </div>`).join('');
  mostrar('vRes');
}

/* ── Slides rotativas ── */
function slides(prox, res){
  if(slideTimer){clearInterval(slideTimer);slideTimer=null;}
  const pool=[];
  if(prox.length) pool.push(()=>renderProx(prox));
  if(res.length)  pool.push(()=>renderRes(res));
  if(!pool.length) return;
  let i=0; pool[0]();
  if(pool.length>1) slideTimer=setInterval(()=>{i=(i+1)%pool.length;pool[i]();},SLIDE_MS);
}

/* ── Build match ── */
function build(e,c){
  const h=c.competitors?.find(x=>x.homeAway==='home')||{};
  const a=c.competitors?.find(x=>x.homeAway==='away')||{};
  const state=c.status?.type?.state;
  return {
    date:e.date, state,
    live:state==='in', pre:state==='pre', ft:state==='post',
    clock:c.status?.displayClock||'',
    sH:h.score??0, sA:a.score??0,
    abH:h.team?.abbreviation||'', abA:a.team?.abbreviation||'',
    nH:trad(h.team?.abbreviation||'',h.team?.displayName||'Local'),
    nA:trad(a.team?.abbreviation||'',a.team?.displayName||'Visitante'),
    lH:h.team?.logo||'', lA:a.team?.logo||'',
    fase:fase(e.season?.slug||''),
  };
}

/* ── Main ── */
async function run(){
  try {
    const data=await(await fetch(ESPN)).json();
    const events=data.events||[];
    const now=Date.now();
    let mArg=null, mOtro=null;
    const prox=[], res=[];

    for(const e of events){
      const c=e.competitions?.[0]; if(!c)continue;
      const m=build(e,c);
      const diffMin=(new Date(m.date)-now)/60000;
      const diffFTMin=(now-new Date(m.date))/60000;
      const esA=esArg(m.abH,m.nH)||esArg(m.abA,m.nA);

      if(esA){
        if(m.live||m.pre||(m.ft&&diffFTMin<=MINS_DESP)) mArg=m;
      } else {
        if(!mOtro){
          if(m.live) mOtro=m;
          else if(m.pre&&diffMin>=0&&diffMin<=MINS_ANTES) mOtro=m;
          else if(m.ft&&diffFTMin>=0&&diffFTMin<=MINS_DESP) mOtro=m;
        }
      }
      if(m.pre&&!esA) prox.push(m);
      if(m.ft) res.push(m);
    }

    if(mArg)       renderA(mArg);
    else if(mOtro) renderP(mOtro);
    else           slides(prox,res);

  } catch(err){ console.error('ESPN error:',err); }
}

run();
setInterval(run,30000);
</script>
